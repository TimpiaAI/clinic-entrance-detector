<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citobiomed - Receptie</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a0a; color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 30px; background: #0a0a0a;
    }
    .call-btn {
      padding: 50px 100px;
      font-size: 48px; font-weight: 800;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: #fff;
      background: linear-gradient(145deg, #e53935, #b71c1c);
      border: none; border-radius: 24px;
      cursor: pointer;
      box-shadow: 0 8px 40px rgba(229,57,53,0.4), 0 0 80px rgba(229,57,53,0.15);
      transition: all 0.2s ease;
      user-select: none;
    }
    .call-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 50px rgba(229,57,53,0.5), 0 0 100px rgba(229,57,53,0.2);
    }
    .call-btn:active { transform: scale(0.97); }
    .call-btn.waiting {
      background: linear-gradient(145deg, #ff8f00, #e65100);
      box-shadow: 0 8px 40px rgba(255,143,0,0.4);
      animation: pulse-wait 2s ease-in-out infinite;
    }
    @keyframes pulse-wait {
      0%, 100% { box-shadow: 0 8px 40px rgba(255,143,0,0.4); }
      50% { box-shadow: 0 12px 60px rgba(255,143,0,0.6); }
    }
    .status { font-size: 18px; color: #666; text-align: center; }
    .status.busy { color: #ff8f00; }
    .status.connected { color: #4caf50; }
    .status.error { color: #f44336; }
    @media (max-width: 600px) {
      .call-btn { padding: 35px 60px; font-size: 28px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="call-btn" class="call-btn">Cheama Pacient</button>
    <div id="status" class="status">Conectare...</div>
  </div>

  <script>
    const btn = document.getElementById('call-btn');
    const status = document.getElementById('status');

    let busy = false;
    let lastSignTimestamp = null;
    let lastFormCompletedTimestamp = null;

    function resetToReady() {
      busy = false;
      btn.textContent = 'Cheama Pacient';
      btn.className = 'call-btn';
      status.textContent = 'Sistem activ - apasati butonul';
      status.className = 'status connected';
    }

    function showBusy() {
      busy = true;
      btn.textContent = 'Pacient in curs...';
      btn.className = 'call-btn waiting';
      status.textContent = 'Pacientul completeaza formularul';
      status.className = 'status busy';
    }

    // WebSocket: monitor event log for form_completed and sign_ready
    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(proto + '//' + location.host + '/ws');

      ws.onopen = () => {
        if (!busy) resetToReady();
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (!data.event_log) return;

          const events = data.event_log;

          // Check for form_completed → reset button
          const formDone = events.find(ev => ev.event === 'form_completed');
          if (formDone && formDone.timestamp !== lastFormCompletedTimestamp) {
            lastFormCompletedTimestamp = formDone.timestamp;
            if (busy) {
              const name = formDone.matched_name || '';
              status.textContent = name
                ? 'Formular completat: ' + name
                : 'Formular completat';
              status.className = 'status connected';
              // Short delay so receptionist sees the name, then reset
              setTimeout(resetToReady, 5000);
            }
          }

          // Check for sign_ready event → open local signature page
          const signEvent = events.find(ev => ev.event === 'sign_ready');
          if (signEvent && signEvent.sign_url && signEvent.timestamp !== lastSignTimestamp) {
            lastSignTimestamp = signEvent.timestamp;
            const pidMatch = signEvent.sign_url.match(/\/sign\/(\d+)/);
            const pid = pidMatch ? pidMatch[1] : '';
            const sigPageUrl = '/signature?url=' + encodeURIComponent(signEvent.sign_url) + '&pid=' + pid;
            console.log('Opening signature page:', sigPageUrl);
            window.open(sigPageUrl, '_blank');
          }
        } catch(err) {}
      };

      ws.onclose = () => {
        status.textContent = 'Deconectat - se reconecteaza...';
        status.className = 'status error';
        setTimeout(connectWs, 3000);
      };
      ws.onerror = () => ws.close();
    }
    connectWs();

    btn.addEventListener('click', async () => {
      if (busy) return;

      try {
        const res = await fetch('/api/call-patient', { method: 'POST' });
        const data = await res.json();

        if (data.status === 'queued') {
          showBusy();
        }
      } catch(err) {
        status.textContent = 'Eroare conexiune!';
        status.className = 'status error';
        setTimeout(resetToReady, 3000);
      }
    });
  </script>
</body>
</html>
