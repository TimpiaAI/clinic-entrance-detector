<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citobiomed - Receptie</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a0a; color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 30px;
      background: #0a0a0a;
    }

    .call-btn {
      padding: 50px 100px;
      font-size: 48px; font-weight: 800;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: #fff;
      background: linear-gradient(145deg, #e53935, #b71c1c);
      border: none; border-radius: 24px;
      cursor: pointer;
      box-shadow: 0 8px 40px rgba(229,57,53,0.4), 0 0 80px rgba(229,57,53,0.15);
      transition: all 0.2s ease;
      user-select: none;
    }
    .call-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 50px rgba(229,57,53,0.5), 0 0 100px rgba(229,57,53,0.2);
    }
    .call-btn:active { transform: scale(0.97); }
    .call-btn.waiting {
      background: linear-gradient(145deg, #ff8f00, #e65100);
      box-shadow: 0 8px 40px rgba(255,143,0,0.4);
      animation: pulse-wait 2s ease-in-out infinite;
    }
    @keyframes pulse-wait {
      0%, 100% { box-shadow: 0 8px 40px rgba(255,143,0,0.4); }
      50% { box-shadow: 0 12px 60px rgba(255,143,0,0.6); }
    }

    .status {
      font-size: 18px; color: #666;
      text-align: center;
    }
    .status.busy { color: #ff8f00; }
    .status.connected { color: #4caf50; }
    .status.error { color: #f44336; }

    @media (max-width: 600px) {
      .call-btn { padding: 35px 60px; font-size: 28px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="call-btn" class="call-btn">Cheama Pacient</button>
    <div id="status" class="status">Conectare...</div>
  </div>

  <script>
    const btn = document.getElementById('call-btn');
    const status = document.getElementById('status');

    let kioskBusy = false;
    let queued = false;

    // Monitor kiosk state via WebSocket
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    function connectWs() {
      const ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen = () => {
        status.textContent = 'Sistem activ - apasati butonul';
        status.className = 'status connected';
      };
      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          // Check event log for workflow state
          if (data.event_log && data.event_log.length > 0) {
            const latest = data.event_log[0];
            // If workflow started (greeting/recording), mark as busy
            if (latest.event === 'call_patient' || latest.event === 'person_entered' || latest.event === 'signin_started') {
              if (!kioskBusy) {
                kioskBusy = true;
                updateUI();
              }
            }
          }
        } catch(err) {}
      };
      ws.onclose = () => {
        status.textContent = 'Deconectat - se reconecteaza...';
        status.className = 'status error';
        setTimeout(connectWs, 3000);
      };
      ws.onerror = () => ws.close();
    }
    connectWs();

    function updateUI() {
      if (kioskBusy && queued) {
        btn.textContent = 'In asteptare...';
        btn.className = 'call-btn waiting';
        status.textContent = 'Pacient curent in curs - urmatorul va fi chemat automat';
        status.className = 'status busy';
      } else if (kioskBusy) {
        status.textContent = 'Pacient in curs de procesare';
        status.className = 'status busy';
      } else {
        btn.textContent = 'Cheama Pacient';
        btn.className = 'call-btn';
        status.textContent = 'Sistem activ - apasati butonul';
        status.className = 'status connected';
      }
    }

    btn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/call-patient', { method: 'POST' });
        const data = await res.json();
        if (data.status === 'queued') {
          if (kioskBusy) {
            queued = true;
          } else {
            kioskBusy = true;
          }
          updateUI();

          // Reset after timeout (workflow typically takes ~2-3 min max)
          setTimeout(() => {
            kioskBusy = false;
            queued = false;
            updateUI();
          }, 180000);
        }
      } catch(err) {
        status.textContent = 'Eroare conexiune!';
        status.className = 'status error';
      }
    });
  </script>
</body>
</html>
