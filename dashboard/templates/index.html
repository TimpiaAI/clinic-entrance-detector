<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Entrance Detector</title>
  <style>
    :root {
      --bg: #f2f4ef;
      --panel: #ffffff;
      --text: #0f1f2b;
      --muted: #5d6a74;
      --accent: #157f79;
      --warn: #c27b0e;
      --ok: #177a3f;
      --danger: #b9313f;
      --border: #d9e1d7;
      --mono: "IBM Plex Mono", "Menlo", monospace;
      --sans: "Space Grotesk", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: radial-gradient(circle at 10% 10%, #eaf4ef 0%, var(--bg) 45%, #e3e8f4 100%);
      color: var(--text);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    header h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.03em;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    main {
      display: grid;
      grid-template-columns: minmax(360px, 2fr) minmax(280px, 1fr);
      gap: 14px;
      padding: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 4px 14px rgba(11, 23, 31, 0.08);
    }

    .video-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f1720;
      min-height: 240px;
    }

    #videoFeed {
      width: 100%;
      display: block;
    }

    .video-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #d6f7d9;
      font-family: var(--mono);
      padding: 7px 8px;
      border-radius: 8px;
      font-size: 0.78rem;
      line-height: 1.3;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #f8fbf9;
    }

    .stat .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 1.05rem;
      font-weight: 700;
      font-family: var(--mono);
    }

    .status-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      background: #f4f7f8;
      font-family: var(--mono);
    }

    .badge.ok { color: var(--ok); border-color: #acd6b9; background: #eefaf2; }
    .badge.err { color: var(--danger); border-color: #e4b7be; background: #fff1f2; }
    .badge.warn { color: var(--warn); border-color: #e8cf9d; background: #fff8ed; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-bottom: 12px;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 7px 4px;
      font-family: var(--mono);
      vertical-align: top;
    }

    .event-log {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafdfb;
      padding: 8px;
      font-family: var(--mono);
      font-size: 0.78rem;
    }

    .event-item {
      padding: 6px;
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid #e3ece4;
      background: #fff;
    }

    .event-item.enter { border-left: 4px solid var(--ok); }
    .event-item.exit { border-left: 4px solid var(--warn); }

    @media (max-width: 1020px) {
      main { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Clinic Entrance Detection Dashboard</h1>
    <div class="header-actions">
      <button id="testWebhookBtn" class="btn">Test Webhook</button>
      <a class="btn primary" href="/calibrate">Calibration</a>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="video-wrap">
        <img id="videoFeed" src="/video_feed" alt="Live video feed" />
        <div class="video-overlay" id="overlayText">Initializing...</div>
      </div>
    </section>

    <section class="panel">
      <div class="status-row">
        <span class="badge" id="cameraBadge">Camera: unknown</span>
        <span class="badge" id="webhookBadge">Webhook: unknown</span>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">Entries Today</div><div class="value" id="entriesToday">0</div></div>
        <div class="stat"><div class="label">Current Persons</div><div class="value" id="currentPeople">0</div></div>
        <div class="stat"><div class="label">Last Entry</div><div class="value" id="lastEntry">-</div></div>
        <div class="stat"><div class="label">FPS</div><div class="value" id="fpsValue">0.0</div></div>
      </div>

      <h3>Tracked People</h3>
      <table>
        <thead>
          <tr><th>ID</th><th>Direction</th><th>Score</th><th>Conf</th></tr>
        </thead>
        <tbody id="peopleTableBody"></tbody>
      </table>

      <h3>Event Log</h3>
      <div class="event-log" id="eventLog"></div>
    </section>
  </main>

  <script>
    const overlayText = document.getElementById("overlayText");
    const entriesToday = document.getElementById("entriesToday");
    const currentPeople = document.getElementById("currentPeople");
    const lastEntry = document.getElementById("lastEntry");
    const fpsValue = document.getElementById("fpsValue");
    const cameraBadge = document.getElementById("cameraBadge");
    const webhookBadge = document.getElementById("webhookBadge");
    const peopleTableBody = document.getElementById("peopleTableBody");
    const eventLog = document.getElementById("eventLog");

    const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
    const socket = new WebSocket(`${wsProtocol}://${location.host}/ws`);

    socket.onmessage = (event) => {
      const data = JSON.parse(event.data);
      render(data);
    };

    socket.onerror = () => {
      overlayText.textContent = "WebSocket disconnected";
    };

    function setBadge(el, label, type) {
      el.textContent = label;
      el.className = `badge ${type}`;
    }

    function render(data) {
      overlayText.textContent = `Frame #${data.frame_number} | Uptime ${Math.floor(data.uptime_seconds)}s`;
      entriesToday.textContent = data.entries_today;
      currentPeople.textContent = data.current_people;
      lastEntry.textContent = data.last_entry_time || "-";
      fpsValue.textContent = (data.fps || 0).toFixed(1);

      setBadge(cameraBadge, `Camera: ${data.camera_connected ? "online" : "offline"}`, data.camera_connected ? "ok" : "err");
      const webhookOk = data.webhook_status && !data.webhook_status.last_error;
      setBadge(webhookBadge, `Webhook: ${webhookOk ? "healthy" : "issues"}`, webhookOk ? "ok" : "warn");

      peopleTableBody.innerHTML = "";
      (data.tracked_people || []).forEach((p) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${p.person_id}</td><td>${p.direction}</td><td>${(p.score || 0).toFixed(2)}</td><td>${(p.confidence || 0).toFixed(2)}</td>`;
        peopleTableBody.appendChild(tr);
      });

      eventLog.innerHTML = "";
      (data.event_log || []).slice(0, 30).forEach((e) => {
        const div = document.createElement("div");
        const cls = e.event === "person_entered" ? "enter" : "exit";
        div.className = `event-item ${cls}`;
        div.textContent = `${e.timestamp} | ${e.event} | id=${e.person_id} | conf=${(e.confidence || 0).toFixed(2)}`;
        eventLog.appendChild(div);
      });
    }

    document.getElementById("testWebhookBtn").addEventListener("click", async () => {
      try {
        const res = await fetch("/api/test-webhook", { method: "POST" });
        if (!res.ok) {
          const txt = await res.text();
          alert(`Webhook test failed: ${txt}`);
          return;
        }
        alert("Test webhook queued.");
      } catch (err) {
        alert(`Request failed: ${err}`);
      }
    });
  </script>
</body>
</html>
